version: '3.9'

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: havamania
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5433:5432'
    volumes:
      - pgdata-dev:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/havamania
      APP_ENV: development
      DEBUG: "true"
      SECRET_KEY: change-me-dev
    ports:
      - '8000:8000'
    volumes:
      - ./backend:/app
    depends_on:
      - postgres

volumes:
  pgdata-dev:
